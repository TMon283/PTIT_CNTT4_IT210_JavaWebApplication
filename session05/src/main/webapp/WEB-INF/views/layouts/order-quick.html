<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
  <title layout:fragment="title">Đặt món nhanh</title>
</head>
<body>
<main layout:fragment="content">
  <h2>Đặt món nhanh</h2>
  <ul>
    <li th:each="dish : ${dishes}">
      <span th:text="${dish.name}">Tên món </span> -
      <span th:text="${dish.price}">Giá </span> VND
    </li>
  </ul>
</main>
</body>
</html>
